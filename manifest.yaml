_metadata:
  major_version: 1
  minor_version: 1

display_information:
  name: Loose Ends
  description: Catches the promises and questions that scroll away in Slack.
  background_color: "#2d1b4e"
  long_description: "Loose Ends watches channel conversations for two things: commitments people make, and questions nobody answered. It stores them, and when a commitment goes overdue or a question goes stale it nudges the owner privately with a card they can act on — done, snooze, reassign, or escalate to a ticket through its own MCP server. It is deliberately conservative: chit-chat and statements of fact are ignored, because an agent that nags you about nothing gets muted on day one."

features:
  bot_user:
    display_name: looseends
    always_online: true
  app_home:
    home_tab_enabled: true
    # REQUIRED: the bot DMs its nudges. Without the messages tab, chat.postMessage
    # to a DM fails with `messages_tab_disabled` and every nudge silently dies.
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  slash_commands:
    - command: /looseends
      description: Your open loose ends
      usage_hint: "check | ask <question> | help"
      should_escape: false

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - groups:history
      - im:history
      - chat:write
      - im:write
      - commands
      - users:read
      - reactions:write
    # RTS. Optional — the app runs without it and says so — but this is what makes
    # `/looseends ask` answer from real workspace messages with citations.
    user:
      - search:read.public

settings:
  event_subscriptions:
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - app_home_opened
  interactivity:
    is_enabled: true
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
