<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4C2A85"/>
      <stop offset="55%" stop-color="#5B3FD9"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1B0B3B" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>

  <g filter="url(#soft)" fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round">
    <!-- The loop — nearly closed, with a small gap at the lower right. -->
    <path d="M318 288
             A 100 100 0 1 0 296 322"/>

    <!-- The loose end — trails AWAY from the loop, down and to the right.
         It never comes back. That's the whole idea. -->
    <path d="M296 322
             C 330 366, 358 380, 396 392"/>
  </g>

  <!-- frayed tip -->
  <circle cx="396" cy="392" r="18" fill="#FFD166"/>
</svg>
